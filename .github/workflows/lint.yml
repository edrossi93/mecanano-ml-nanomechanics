name: Lint — helper package

# Lints only the shared helper package in src/ (not the notebooks, which use a
# deliberately compact teaching style). Rules are configured in ruff.toml to
# catch real problems — undefined names, unused imports — not style nitpicks.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check src/
