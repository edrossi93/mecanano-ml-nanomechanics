name: CI — execute notebooks

# Runs every tutorial notebook top-to-bottom on a clean CPU machine and fails
# the build if any cell errors. This is the automated version of the manual
# "run everything" check. Notebook 13 (YOLO) is optional/heavy and excluded.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:        # allows running it by hand from the Actions tab

jobs:
  notebooks:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install the CPU-only stack
        run: |
          python -m pip install --upgrade pip
          # Install a CPU-only PyTorch first (the default Linux wheel bundles
          # large CUDA libraries we don't need), then the rest of the stack.
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install nbmake pytest

      - name: Execute all notebooks except 13 (fail on any error)
        run: |
          pytest --nbmake --nbmake-timeout=900 -q \
            notebooks/ \
            --ignore=notebooks/13_yolo_defect_detection.ipynb
